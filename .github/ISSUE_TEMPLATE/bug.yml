name: Bug report
description: Report a reproducible defect using synthetic data.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Do not include secrets, credentials, personal information, or production data. Report vulnerabilities through SECURITY.md."
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Identify the affected release or commit.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Provide minimal steps and synthetic inputs.
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Expected and actual results
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I included no secrets, credentials, personal information, or production data.
          required: true
    validations:
      required: true

